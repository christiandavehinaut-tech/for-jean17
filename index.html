<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Congrats Jean Langg! 🎓💐</title>
    <style>
        body {
            background-color: #fff5f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .booklet {
            width: 380px;
            max-width: 100%;
            background: #ffffff;
            border-radius: 30px;
            box-shadow: 0 20px 45px rgba(139, 69, 19, 0.15);
            padding: 40px 30px;
            text-align: center;
            border: 3px solid #ffdeeb;
            position: relative;
        }

        .character-box {
            position: relative;
            margin-bottom: 10px;
        }

        .character-img {
            width: 150px;
            height: auto;
        }

        .bouquet-icon {
            font-size: 45px;
            display: block;
            margin-top: -15px;
            margin-bottom: 15px;
        }

        h1 {
            color: #8b4513; 
            font-size: 22px;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .subtitle {
            color: #db2777;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 15px;
            display: block;
        }

        .message {
            color: #ff85a2;
            font-size: 17px;
            line-height: 1.4;
            font-weight: bold;
            font-style: italic;
            margin-bottom: 20px;
        }

        /* Proud BF Love Note Section */
        .love-note {
            background: #fff0f3;
            border-left: 4px solid #ffb7c5;
            padding: 15px;
            margin-bottom: 25px;
            border-radius: 10px;
            text-align: left;
        }

        .love-note p {
            color: #9d174d;
            font-size: 14px;
            margin: 0;
            line-height: 1.6;
        }

        .redirect-btn {
            background-color: #ffb7c5;
            color: #8b4513;
            border: none;
            padding: 15px 35px;
            border-radius: 50px;
            font-weight: 900;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            box-shadow: 0 4px 0px #f4a2b3;
            width: 80%;
        }

        .redirect-btn:hover {
            transform: scale(1.03);
            background-color: #ffc2cd;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-12px); }
        }
        .float-animation {
            animation: float 2s infinite alternate ease-in-out;
        }

        @keyframes sway {
            0% { transform: rotate(-5deg); }
            100% { transform: rotate(5deg); }
        }
        .sway-animation {
            display: inline-block;
            animation: sway 1.5s infinite alternate ease-in-out;
        }
    </style>
</head>
<body>

    <div class="booklet">
        <div class="character-box float-animation">
            <img src="https://media.tenor.com/7S8fC3U4p80AAAAi/bubu-dudu-bubu.gif" alt="Bubu and Dudu" class="character-img">
        </div>

        <div class="bouquet-icon sway-animation">💐</div>
        
        <h1>CONGRATS JEAN LANGG! 🎓</h1>
        <span class="subtitle">Official Graduate 2026 ✨</span>

        <div class="love-note">
            <p><strong>From your #1 fan:</strong><br>
            I've seen all the hard work you put in, and seeing you reach this goal makes me the proudest person in the world. You did it, love!</p>
        </div>

        <p class="message">"I love you always, in all ways!!"</p>

        <!-- Replace with your actual Canva link -->
        <a href="https://canva.link/qo672ool01zcx3v" target="_blank" class="redirect-btn">OPEN SURPRISE 🎁</a>
        
        <p style="font-size: 11px; color: #d2b48c; margin-top: 20px;">Always proud of you, my love. ❤️</p>
    </div>

</body>
</html>
